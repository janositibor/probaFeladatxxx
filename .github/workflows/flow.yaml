name: probaFeladat With CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: probaFeladat_test
          MYSQL_USER: probaFeladatUser
          MYSQL_PASSWORD: probaFeladatPass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -uroot -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 26
        uses: actions/setup-java@v3
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven
      
      - name: Wait for MariaDB to be ready
        run: |
          echo "Waiting for MariaDB..."
          until mysql -h 127.0.0.1 -u root -prootpassword -e "SELECT 1"; do
            sleep 2
          done
      
      - name: Build with Maven
        run: mvn verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mariadb://127.0.0.1:3306/probaFeladat_test
          SPRING_DATASOURCE_USERNAME: probaFeladatUser
          SPRING_DATASOURCE_PASSWORD: probaFeladatPass
      
      - uses: actions/upload-artifact@v4
        with:
          name: probaFeladat
          path: target/*.jar

  notify:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "GitHub Action Failed"
          to: janositibor@gmail.com
          from: "GitHub Actions <janositibor@gmail.com>"
          body: |
            A GitHub Actions workflow failed.
            Repo: ${{ github.repository }}
            Link: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}